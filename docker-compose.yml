services:
  api:
    build: .
    container_name: flood-api
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      APP_ENV: "local"
      LLM_API_PREFIX: "/llm"
      CHROMA_PERSIST_DIR: "/app/chroma_data"
    volumes:
      - chroma_data:/app/chroma_data
    restart: unless-stopped

volumes:
  chroma_data:
